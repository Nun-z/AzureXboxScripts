# Universal Windows Platform
# Generates a .appxbundle file that can be installed to an Xbox in dev mode.

trigger: 
- master
  
name: $(MajorVersion).$(MinorVersion).$(date:yy)$(DayOfYear).0

pool:
  vmImage: 'windows-latest'

variables:
- group: uwp-pipeline
- name: solution
  value: '**/PPSSPP_UWP.sln'
- name: buildPlatform
  value: 'x64'
- name: buildConfiguration
  value: 'UWP Gold'
- name: appxPackageDir
  value: '$(build.artifactStagingDirectory)\AppxPackages\\'
- name: pfxpath 
  value: '$(Agent.TempDirectory)\PPSSPPCert.pfx'
- name: build  
  value: '$(Build.BuildId)'
- name: MajorVersion
  value: '20'
- name: MinorVersion
  value: '1'
- name: 'customBuildNumber'
  value: '$(MajorVersion).$(MinorVersion).$(date:yy)$(DayOfYear)$(rev:.r)'

steps:
- task: DownloadSecureFile@1
  name: mySecureFile
  displayName: 'Get the pfx file certificate'
  inputs:
    secureFile: 'PPSSPPCert.pfx'

- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
    
      #Get the PPSSPP code
      git clone -b master --single-branch https://github.com/Nun-z/ppsspp.git --recursive

      #Import the certificate included in the repo
      Write-Host "Import Certificate" 
      $pfxpath = '$(pfxpath)'
      $password = 'test'
      Add-Type -AssemblyName System.Security
      $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2
      $cert.Import($pfxpath, $password, [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]"PersistKeySet")
      $store = new-object system.security.cryptography.X509Certificates.X509Store -argumentlist "MY", CurrentUser
      $store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]"ReadWrite")
      $store.Add($cert)
      $store.Close()

      move .\ppsspp\UWP\PackageGold.appxmanifest .\ppsspp\UWP\Package.appxmanifest

#Auto-increment the build number for store submission      
- task: VersionAPPX@2
  inputs:
    Path: '$(Build.SourcesDirectory)\**'
    VersionNumber: '$(Build.BuildNumber)'
    InjectVersion: False
    VersionRegex: '(0|[1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])(\.(0|[1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])){3}'
    OutputVersion: 'OutputedVersion'

#Build the package
- task: VSBuild@1
  inputs:
    platform: '$(buildPlatform)'
    solution: '$(solution)'
    configuration: '$(buildConfiguration)'
    msbuildArgs: '/p:AppxBundlePlatforms="$(buildPlatform)" /p:AppxPackageDir="$(appxPackageDir)" /p:AppxBundle=Always /p:UapAppxPackageBuildMode=SideloadOnly'
  
#Copy the package to staging directory
- task: CopyFiles@2
  displayName: 'Copy Files to: $(build.artifactstagingdirectory)'
  inputs:
    SourceFolder: 'D:\a\1\a\AppxPackages'
    Contents: '**\*.appxbundle'
    TargetFolder: '$(build.artifactstagingdirectory)'

#Keep the package instead of deleting it
- task: PublishBuildArtifacts@1
  displayName: 'PPSSPP store'
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
